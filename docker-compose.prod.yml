services:
    nginx:
        image: nginx:alpine
        ports:
            - '${APP_PORT:-80}:80'
        volumes:
            - './docker/production/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro'
            - './public:/var/www/html/public:ro'
        depends_on:
            - app
        networks:
            - truckflow
        restart: unless-stopped

    app:
        build:
            context: .
            dockerfile: docker/production/Dockerfile
        image: truckflow-api:latest
        env_file:
            - .env
        volumes:
            - './storage:/var/www/html/storage'
        depends_on:
            pgsql:
                condition: service_healthy
            redis:
                condition: service_healthy
        networks:
            - truckflow
        restart: unless-stopped

    queue:
        image: truckflow-api:latest
        command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
        env_file:
            - .env
        volumes:
            - './storage:/var/www/html/storage'
        depends_on:
            - app
            - redis
        networks:
            - truckflow
        restart: unless-stopped

    pgsql:
        image: postgis/postgis:17-3.5
        environment:
            POSTGRES_DB: '${DB_DATABASE}'
            POSTGRES_USER: '${DB_USERNAME}'
            POSTGRES_PASSWORD: '${DB_PASSWORD}'
        volumes:
            - truckflow-pgsql:/var/lib/postgresql/data
        networks:
            - truckflow
        healthcheck:
            test: ['CMD', 'pg_isready', '-q', '-d', '${DB_DATABASE}', '-U', '${DB_USERNAME}']
            retries: 5
            timeout: 5s
        restart: unless-stopped

    redis:
        image: redis:alpine
        command: redis-server --appendonly yes
        volumes:
            - truckflow-redis:/data
        networks:
            - truckflow
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            retries: 5
            timeout: 5s
        restart: unless-stopped

networks:
    truckflow:
        driver: bridge

volumes:
    truckflow-pgsql:
    truckflow-redis:
