# Stack opcional: API Laravel + microserviço Java de geolocalização
#
# Uso:
#   docker compose -f compose.yaml -f docker-compose.geo.yml up -d
#
# No .env da API:
#   GEO_ROUTING_DRIVER=java
#   GEO_JAVA_SERVICE_URL=http://truckflow-geo:8081

services:
  truckflow-geo:
    build:
      context: ../truckflow-geo
      dockerfile: Dockerfile
    ports:
      - '${GEO_SERVICE_PORT:-8081}:8081'
    environment:
      GOOGLE_MAPS_API_KEY: '${GOOGLE_MAPS_API_KEY}'
      SERVER_PORT: 8081
    networks:
      - sail
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8081/actuator/health']
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  sail:
    external: true
